<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>카카오페이 - 홈 (위험 감지)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="shared.css">
<style>
  /* index.html 스타일 상속하되 알림 배너 추가 */
  .home-header {
    padding: 8px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg-white);
  }
  .kp-logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: 6px; }
  .kp-logo .dot {
    width: 22px; height: 22px; background: var(--kakao-yellow); border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 800; color: var(--text-primary);
  }
  .icon-btn { background: none; border: none; cursor: pointer; width: 32px; height: 32px; color: var(--text-primary); }
  .header-actions { display: flex; gap: 8px; }

  /* 알림 배너 - 핵심 */
  .alert-banner {
    margin: 8px 20px 0;
    background: var(--text-primary);
    color: white;
    border-radius: 16px;
    padding: 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    border: none;
    width: calc(100% - 40px);
    font-family: var(--font);
    text-align: left;
  }
  .alert-banner .a-icon {
    width: 40px; height: 40px;
    background: var(--danger);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .alert-banner .a-body { flex: 1; min-width: 0; }
  .alert-banner .a-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 4px;
    line-height: 1.35;
  }
  .alert-banner .a-desc {
    font-size: 12px;
    opacity: 0.75;
    line-height: 1.4;
  }
  .alert-banner .a-arrow {
    font-size: 20px;
    opacity: 0.5;
    flex-shrink: 0;
  }
  .alert-banner .pulse {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--danger);
    border-radius: 50%;
    margin-right: 4px;
    animation: pulse 1.5s infinite;
    vertical-align: middle;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(1.3); }
  }

  /* 자산 카드 (블러 처리) */
  .asset {
    padding: 20px;
    background: var(--bg-white);
  }
  .asset-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; }
  .asset-amount {
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.8px;
    color: var(--text-primary);
    margin-bottom: 16px;
    filter: blur(6px);
    user-select: none;
  }
  .asset-amount .unit { font-size: 22px; font-weight: 700; }
  .asset-actions { display: flex; gap: 8px; }
  .asset-actions .mini-btn {
    padding: 10px 16px; background: var(--bg-card); border: none;
    border-radius: 10px; font-size: 13px; font-weight: 600;
    color: var(--text-tertiary); cursor: not-allowed; font-family: var(--font);
  }
  .asset-locked-note {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 12px;
    display: flex; align-items: center; gap: 6px;
  }

  /* 결제 큰 CTA (비활성) */
  .pay-cta {
    margin: 8px 20px 20px;
    padding: 18px;
    background: var(--bg-card);
    border-radius: 16px;
    color: var(--text-tertiary);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: not-allowed;
    border: none;
    width: calc(100% - 40px);
    font-family: var(--font);
  }
  .pay-cta .l { text-align: left; }
  .pay-cta .l .t1 { font-size: 12px; margin-bottom: 2px; }
  .pay-cta .l .t2 { font-size: 15px; font-weight: 700; }
  .pay-cta .lock { font-size: 16px; }

  /* 하단 탭바 */
  .tabbar {
    background: var(--bg-white); border-top: 1px solid var(--border);
    padding: 8px 0 24px; display: flex; justify-content: space-around;
    flex-shrink: 0;
  }
  .tab {
    background: none; border: none; display: flex; flex-direction: column;
    align-items: center; gap: 3px; padding: 6px 4px; cursor: pointer;
    font-family: var(--font); color: var(--text-tertiary);
  }
  .tab.active { color: var(--text-primary); }
  .tab .t-icon { font-size: 20px; }
  .tab .t-label { font-size: 10px; font-weight: 600; }
</style>
</head>
<body>

<div class="device">
  <div class="page-label">2. 결제 접속 (기능 4 발동 직후)</div>
  <div class="screen">
    <div class="scroll-area">

    <div class="status-bar">
      <span>9:41</span>
      <div class="right">
        <span class="signal"></span><span>5G</span>
        <div class="battery"><div class="battery-fill"></div></div>
      </div>
    </div>

    <!-- 앱 헤더 -->
    <div class="home-header">
      <div class="kp-logo"><span class="dot">P</span><span>pay</span></div>
      <div class="header-actions">
        <button class="icon-btn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M20 20L16.5 16.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
        <button class="icon-btn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M6 8a6 6 0 1112 0c0 5 2 7 2 7H4s2-2 2-7z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M10 19a2 2 0 004 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
      </div>
    </div>

    <!-- 핵심: 알림 배너 -->
    <button class="alert-banner" onclick="location.href='notify.html'">
      <div class="a-icon">🛡️</div>
      <div class="a-body">
        <div class="a-title"><span class="pulse"></span>낯선 접속이 감지되었어요</div>
        <div class="a-desc">지난밤 3건의 결제 시도를 막았어요.<br>연결된 서비스를 지금 확인해주세요.</div>
      </div>
      <div class="a-arrow">›</div>
    </button>

    <!-- 자산 (블러 처리) -->
    <div class="asset">
      <div class="asset-label">머니</div>
      <div class="asset-amount mono-num">1,234,567<span class="unit">원</span></div>
      <div class="asset-actions">
        <button class="mini-btn">충전</button>
        <button class="mini-btn">송금</button>
        <button class="mini-btn">더보기</button>
      </div>
      <div class="asset-locked-note">
        🔒 안전 확인 후 다시 이용할 수 있어요
      </div>
    </div>

    <!-- 결제 (비활성) -->
    <button class="pay-cta">
      <div class="l">
        <div class="t1">간편결제</div>
        <div class="t2">일시 보호 중</div>
      </div>
      <div class="lock">🔒</div>
    </button>

    </div><!-- /scroll-area -->

    <!-- 하단 탭바 -->
    <div class="tabbar">
      <button class="tab active"><span class="t-icon">🏠</span><span class="t-label">홈</span></button>
      <button class="tab"><span class="t-icon">💳</span><span class="t-label">결제</span></button>
      <button class="tab"><span class="t-icon">💰</span><span class="t-label">자산</span></button>
      <button class="tab"><span class="t-icon">🎁</span><span class="t-label">혜택</span></button>
      <button class="tab"><span class="t-icon">☰</span><span class="t-label">전체</span></button>
    </div>

  </div>
</div>

</body>
</html>
