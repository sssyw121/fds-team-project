<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>재알림 (잠금화면)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="shared.css">
<style>
  /* 잠금화면 오버라이드 */
  .device.lock {
    background: #000;
  }
  .screen.lock {
    background:
      linear-gradient(180deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 30%, rgba(0,0,0,0) 70%, rgba(0,0,0,0.6) 100%),
      linear-gradient(135deg, #1e2a4a 0%, #2c1e3f 50%, #3a1a2e 100%);
    color: white;
  }
  .status-bar.dark {
    color: white;
    background: transparent;
  }
  .status-bar.dark .signal::before {
    background:
      linear-gradient(to top, white 30%, transparent 30%) 0 0/3px 100% no-repeat,
      linear-gradient(to top, white 50%, transparent 50%) 4px 0/3px 100% no-repeat,
      linear-gradient(to top, white 75%, transparent 75%) 8px 0/3px 100% no-repeat,
      linear-gradient(to top, white 100%, transparent 100%) 12px 0/3px 100% no-repeat;
  }
  .status-bar.dark .battery {
    border-color: white;
  }
  .status-bar.dark .battery::after { background: white; }
  .status-bar.dark .battery-fill { background: white; }

  /* 시간과 날짜 */
  .lock-time {
    padding: 20px 20px 60px;
    text-align: center;
  }
  .lock-date {
    font-size: 15px;
    font-weight: 500;
    opacity: 0.9;
    margin-bottom: 4px;
    letter-spacing: -0.2px;
  }
  .lock-hour {
    font-size: 88px;
    font-weight: 200;
    letter-spacing: -3px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  /* 알림 스택 */
  .notifs {
    padding: 0 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .notif {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 14px;
    padding: 12px 14px;
    color: white;
    cursor: pointer;
    border: none;
    text-align: left;
    font-family: var(--font);
    width: 100%;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .notif:active {
    background: rgba(255,255,255,0.2);
  }
  .notif-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    background: var(--kakao-yellow);
    color: black;
    font-weight: 800;
  }
  .notif-icon.mail {
    background: rgba(255,255,255,0.9);
    color: #333;
  }
  .notif-icon.sms {
    background: #34C759;
    color: white;
  }
  .notif-body { flex: 1; min-width: 0; }
  .notif-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2px;
  }
  .notif-app {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    opacity: 0.85;
  }
  .notif-time {
    font-size: 11px;
    opacity: 0.6;
  }
  .notif-title {
    font-size: 13px;
    font-weight: 700;
    line-height: 1.35;
    margin-bottom: 2px;
    letter-spacing: -0.1px;
  }
  .notif-title .urgent {
    background: #FF3B30;
    color: white;
    font-size: 10px;
    font-weight: 800;
    padding: 1px 5px;
    border-radius: 4px;
    margin-right: 4px;
    letter-spacing: 0.3px;
    vertical-align: middle;
  }
  .notif-desc {
    font-size: 12px;
    line-height: 1.4;
    opacity: 0.85;
  }

  /* 하단 힌트 */
  .lock-hint {
    padding: 24px 20px 40px;
    text-align: center;
    font-size: 12px;
    opacity: 0.7;
    margin-top: auto;
  }
  .lock-hint .swipe {
    display: block;
    margin-bottom: 8px;
    font-size: 18px;
  }

  /* 상황 설명 배너 (튜토리얼용) */
  .context-note {
    position: absolute;
    top: -32px;
    left: 0;
    right: 0;
    color: #999;
    font-size: 11px;
    font-family: var(--font);
    font-weight: 500;
  }
  .context-note strong { color: var(--danger); }
</style>
</head>
<body>

<div class="device lock">
  <div class="page-label">B. 원래 연락처로 재알림 (12분 뒤 잠금화면)</div>
  <div class="screen lock">
    <div class="scroll-area">

    <div class="status-bar dark">
      <span>9:53</span>
      <div class="right">
        <span class="signal"></span><span>5G</span>
        <div class="battery"><div class="battery-fill"></div></div>
      </div>
    </div>

    <!-- 시간 -->
    <div class="lock-time">
      <div class="lock-date">12월 15일 화요일</div>
      <div class="lock-hour">9:53</div>
    </div>

    <!-- 알림 스택 -->
    <div class="notifs">

      <!-- 카카오페이 앱 푸시 (탭 가능) -->
      <button class="notif" onclick="location.href='re-detected.html'">
        <div class="notif-icon">P</div>
        <div class="notif-body">
          <div class="notif-head">
            <span class="notif-app">카카오페이</span>
            <span class="notif-time">방금</span>
          </div>
          <div class="notif-title">
            <span class="urgent">긴급</span>비밀번호가 변경됐어요
          </div>
          <div class="notif-desc">
            지현님이 변경하신 게 아니라면 지금 확인해주세요.
          </div>
        </div>
      </button>

      <!-- 이메일 알림 -->
      <button class="notif" onclick="location.href='re-detected.html'">
        <div class="notif-icon mail">✉</div>
        <div class="notif-body">
          <div class="notif-head">
            <span class="notif-app">메일</span>
            <span class="notif-time">방금</span>
          </div>
          <div class="notif-title">[카카오] 계정 정보 변경 알림</div>
          <div class="notif-desc">
            hyun****@naver.com · 원래 등록된 주소로 발송
          </div>
        </div>
      </button>

      <!-- 문자 알림 -->
      <button class="notif" onclick="location.href='re-detected.html'">
        <div class="notif-icon sms">💬</div>
        <div class="notif-body">
          <div class="notif-head">
            <span class="notif-app">메시지</span>
            <span class="notif-time">방금</span>
          </div>
          <div class="notif-title">[Web발신]</div>
          <div class="notif-desc">
            [카카오] 계정 비밀번호가 방금 변경되었습니다. 본인 요청이 아니라면 앱을 확인해주세요.
          </div>
        </div>
      </button>

    </div>

    <!-- 하단 힌트 -->
    <div class="lock-hint">
      <span class="swipe">☝</span>
      알림을 눌러 확인하기
    </div>

    </div><!-- /scroll-area -->

  </div>
</div>

</body>
</html>
