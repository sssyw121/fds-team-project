<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>카카오페이 - 홈 (평시)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
/* ============================================
   FDS 프로토타입 공통 스타일
   카카오페이 톤 (흰 배경 + 검정 + 옐로우 CTA)
   ============================================ */

@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  /* Colors */
  --kakao-yellow: #FEE500;
  --kakao-yellow-dark: #FADA0A;
  --text-primary: #191919;
  --text-secondary: #767676;
  --text-tertiary: #A0A0A0;
  --bg-white: #FFFFFF;
  --bg-section: #F7F8FA;
  --bg-card: #F5F6F8;
  --border: #EEEEEE;
  --border-strong: #E0E0E0;

  --danger: #FF3B30;
  --danger-bg: #FFF1F0;
  --warning: #FF9500;
  --warning-bg: #FFF7EB;
  --safe: #00A661;
  --safe-bg: #E7F7EF;
  --info: #3182F6;
  --info-bg: #EEF5FF;

  /* Typography scale */
  --font: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
}

body {
  font-family: var(--font);
  background: #1a1a1a;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 24px 12px;
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
}

/* ============ 모바일 프레임 ============ */
.device {
  width: 375px;
  height: 812px;
  background: var(--bg-white);
  border-radius: 44px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  border: 10px solid #1a1a1a;
}

.screen {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  background: var(--bg-white);
}

.scroll-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
}

.scroll-area::-webkit-scrollbar { display: none; }

/* ============ 상태바 ============ */
.status-bar {
  height: 44px;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  background: var(--bg-white);
  position: sticky;
  top: 0;
  z-index: 100;
}

.status-bar .right {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
}

.status-bar .signal::before {
  content: '';
  display: inline-block;
  width: 16px;
  height: 10px;
  background:
    linear-gradient(to top, var(--text-primary) 30%, transparent 30%) 0 0/3px 100% no-repeat,
    linear-gradient(to top, var(--text-primary) 50%, transparent 50%) 4px 0/3px 100% no-repeat,
    linear-gradient(to top, var(--text-primary) 75%, transparent 75%) 8px 0/3px 100% no-repeat,
    linear-gradient(to top, var(--text-primary) 100%, transparent 100%) 12px 0/3px 100% no-repeat;
}

.status-bar .battery {
  width: 24px;
  height: 12px;
  border: 1.5px solid var(--text-primary);
  border-radius: 3px;
  position: relative;
  padding: 1px;
}

.status-bar .battery::after {
  content: '';
  position: absolute;
  right: -3px;
  top: 3px;
  width: 2px;
  height: 4px;
  background: var(--text-primary);
  border-radius: 0 1px 1px 0;
}

.status-bar .battery-fill {
  height: 100%;
  width: 75%;
  background: var(--text-primary);
  border-radius: 1px;
}

/* ============ 앱 헤더 ============ */
.app-header {
  height: 52px;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg-white);
  border-bottom: 1px solid var(--border);
}

.app-header .title {
  font-size: 17px;
  font-weight: 600;
  color: var(--text-primary);
}

.app-header .back {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  color: var(--text-primary);
}

.app-header .actions {
  display: flex;
  gap: 16px;
}

.app-header .actions button {
  width: 28px;
  height: 28px;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-primary);
}

/* ============ 콘텐츠 ============ */
.content {
  padding: 20px 20px 40px;
}

.section-title {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--text-primary);
  margin-bottom: 12px;
}

.subtle {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
}

/* ============ 카드 ============ */
.card {
  background: var(--bg-white);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 12px;
}

.card.flat {
  background: var(--bg-card);
  border: none;
}

/* ============ CTA 버튼 ============ */
.cta-fixed {
  padding: 12px 20px 24px;
  background: var(--bg-white);
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex-shrink: 0;
  border-top: 1px solid var(--border);
}

.btn {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  font-family: var(--font);
  transition: transform 0.05s ease;
  letter-spacing: -0.2px;
}

.btn:active { transform: scale(0.98); }

.btn.primary {
  background: var(--kakao-yellow);
  color: var(--text-primary);
}

.btn.secondary {
  background: var(--bg-card);
  color: var(--text-primary);
}

.btn.ghost {
  background: transparent;
  color: var(--text-secondary);
  font-size: 14px;
  padding: 8px;
}

.btn.danger {
  background: var(--text-primary);
  color: var(--bg-white);
}

/* ============ 뱃지 ============ */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: -0.1px;
}

.badge.danger { background: var(--danger-bg); color: var(--danger); }
.badge.warning { background: var(--warning-bg); color: var(--warning); }
.badge.safe { background: var(--safe-bg); color: var(--safe); }
.badge.info { background: var(--info-bg); color: var(--info); }
.badge.neutral { background: var(--bg-card); color: var(--text-secondary); }

/* ============ 서비스 아이콘 (연동 서비스용) ============ */
.svc-icon {
  width: 44px;
  height: 44px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
}

/* ============ 유틸 ============ */
.row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.between {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.stack { display: flex; flex-direction: column; gap: 4px; }

.divider {
  height: 8px;
  background: var(--bg-section);
  margin: 0 -20px;
}

.mono-num {
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.5px;
}

/* ============ 페이지 라벨 (튜토리얼 안내용) ============ */
.page-label {
  position: absolute;
  top: -32px;
  left: 0;
  color: #999;
  font-size: 12px;
  font-family: var(--font);
  font-weight: 500;
}

</style>
<style>

    cursor: pointer;

  }

  /* 그리드 메뉴 */
  .menu-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    padding: 12px 12px 0;
  }
  .menu-item {
    background: none; border: none; cursor: pointer;
    padding: 14px 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    font-family: var(--font);
  }
  .menu-item .m-icon {
    width: 40px; height: 40px;
    background: var(--bg-card);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }
  .menu-item .m-label {
    font-size: 12px;
    color: var(--text-primary);
    font-weight: 500;
  }

  /* 최근 결제 */
  .recent {
    padding: 20px;
  }
  .recent-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .recent-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .recent-more {
    font-size: 12px;
    color: var(--text-secondary);
    background: none; border: none; cursor: pointer;
    font-family: var(--font);
  }

  .txn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
  }
  .txn-icon {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--bg-card);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .txn-body { flex: 1; min-width: 0; }
  .txn-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 2px;
  }
  .txn-time {
    font-size: 12px;
    color: var(--text-tertiary);
  }
  .txn-amount {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
  }

  /* 결제 큰 버튼 (홈에서 결제로 진입) */
  .pay-cta {
    margin: 8px 20px 20px;
    padding: 18px;
    background: var(--text-primary);
    border-radius: 16px;
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    border: none;
    width: calc(100% - 40px);
    font-family: var(--font);
  }
  .pay-cta .l { text-align: left; }
  .pay-cta .l .t1 { font-size: 12px; opacity: 0.7; margin-bottom: 2px; }
  .pay-cta .l .t2 { font-size: 15px; font-weight: 700; }
  .pay-cta .arrow { font-size: 20px; opacity: 0.7; }

  /* 하단 탭바 */
  .tabbar {
    background: var(--bg-white);
    border-top: 1px solid var(--border);
    padding: 8px 0 24px;
    display: flex;
    justify-content: space-around;
    flex-shrink: 0;
  }
  .tab {
    background: none; border: none;
    display: flex; flex-direction: column;
    align-items: center; gap: 3px;
    padding: 6px 4px;
    cursor: pointer;
    font-family: var(--font);
    color: var(--text-tertiary);
  }
  .tab.active { color: var(--text-primary); }
  .tab .t-icon { font-size: 20px; }
  .tab .t-label { font-size: 10px; font-weight: 600; }
</style>
</head>
