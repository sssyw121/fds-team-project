<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>계정 보호 조치</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
/* ============================================
   FDS 프로토타입 공통 스타일
   카카오페이 톤 (흰 배경 + 검정 + 옐로우 CTA)
   ============================================ */

@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  /* Colors */
  --kakao-yellow: #FEE500;
  --kakao-yellow-dark: #FADA0A;
  --text-primary: #191919;
  --text-secondary: #767676;
  --text-tertiary: #A0A0A0;
  --bg-white: #FFFFFF;
  --bg-section: #F7F8FA;
  --bg-card: #F5F6F8;
  --border: #EEEEEE;
  --border-strong: #E0E0E0;

  --danger: #FF3B30;
  --danger-bg: #FFF1F0;
  --warning: #FF9500;
  --warning-bg: #FFF7EB;
  --safe: #00A661;
  --safe-bg: #E7F7EF;
  --info: #3182F6;
  --info-bg: #EEF5FF;

  /* Typography scale */
  --font: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
}

body {
  font-family: var(--font);
  background: #1a1a1a;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 24px 12px;
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
}

/* ============ 모바일 프레임 ============ */
.device {
  width: 375px;
  height: 812px;
  background: var(--bg-white);
  border-radius: 44px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  border: 10px solid #1a1a1a;
}

.screen {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  background: var(--bg-white);
}

.scroll-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
}

.scroll-area::-webkit-scrollbar { display: none; }

/* ============ 상태바 ============ */
.status-bar {
  height: 44px;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  background: var(--bg-white);
  position: sticky;
  top: 0;
  z-index: 100;
}

.status-bar .right {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
}

.status-bar .signal::before {
  content: '';
  display: inline-block;
  width: 16px;
  height: 10px;
  background:
    linear-gradient(to top, var(--text-primary) 30%, transparent 30%) 0 0/3px 100% no-repeat,
    linear-gradient(to top, var(--text-primary) 50%, transparent 50%) 4px 0/3px 100% no-repeat,
    linear-gradient(to top, var(--text-primary) 75%, transparent 75%) 8px 0/3px 100% no-repeat,
    linear-gradient(to top, var(--text-primary) 100%, transparent 100%) 12px 0/3px 100% no-repeat;
}

.status-bar .battery {
  width: 24px;
  height: 12px;
  border: 1.5px solid var(--text-primary);
  border-radius: 3px;
  position: relative;
  padding: 1px;
}

.status-bar .battery::after {
  content: '';
  position: absolute;
  right: -3px;
  top: 3px;
  width: 2px;
  height: 4px;
  background: var(--text-primary);
  border-radius: 0 1px 1px 0;
}

.status-bar .battery-fill {
  height: 100%;
  width: 75%;
  background: var(--text-primary);
  border-radius: 1px;
}

/* ============ 앱 헤더 ============ */
.app-header {
  height: 52px;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg-white);
  border-bottom: 1px solid var(--border);
}

.app-header .title {
  font-size: 17px;
  font-weight: 600;
  color: var(--text-primary);
}

.app-header .back {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  color: var(--text-primary);
}

.app-header .actions {
  display: flex;
  gap: 16px;
}

.app-header .actions button {
  width: 28px;
  height: 28px;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-primary);
}

/* ============ 콘텐츠 ============ */
.content {
  padding: 20px 20px 40px;
}

.section-title {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--text-primary);
  margin-bottom: 12px;
}

.subtle {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
}

/* ============ 카드 ============ */
.card {
  background: var(--bg-white);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 12px;
}

.card.flat {
  background: var(--bg-card);
  border: none;
}

/* ============ CTA 버튼 ============ */
.cta-fixed {
  padding: 12px 20px 24px;
  background: var(--bg-white);
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex-shrink: 0;
  border-top: 1px solid var(--border);
}

.btn {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  font-family: var(--font);
  transition: transform 0.05s ease;
  letter-spacing: -0.2px;
}

.btn:active { transform: scale(0.98); }

.btn.primary {
  background: var(--kakao-yellow);
  color: var(--text-primary);
}

.btn.secondary {
  background: var(--bg-card);
  color: var(--text-primary);
}

.btn.ghost {
  background: transparent;
  color: var(--text-secondary);
  font-size: 14px;
  padding: 8px;
}

.btn.danger {
  background: var(--text-primary);
  color: var(--bg-white);
}

/* ============ 뱃지 ============ */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: -0.1px;
}

.badge.danger { background: var(--danger-bg); color: var(--danger); }
.badge.warning { background: var(--warning-bg); color: var(--warning); }
.badge.safe { background: var(--safe-bg); color: var(--safe); }
.badge.info { background: var(--info-bg); color: var(--info); }
.badge.neutral { background: var(--bg-card); color: var(--text-secondary); }

/* ============ 서비스 아이콘 (연동 서비스용) ============ */
.svc-icon {
  width: 44px;
  height: 44px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
}

/* ============ 유틸 ============ */
.row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.between {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.stack { display: flex; flex-direction: column; gap: 4px; }

.divider {
  height: 8px;
  background: var(--bg-section);
  margin: 0 -20px;
}

.mono-num {
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.5px;
}

/* ============ 페이지 라벨 (튜토리얼 안내용) ============ */
.page-label {
  position: absolute;
  top: -32px;
  left: 0;
  color: #999;
  font-size: 12px;
  font-family: var(--font);
  font-weight: 500;
}

</style>
<style>
  .protect-hero {
    padding: 20px 20px 24px;
    background: var(--bg-white);
  }
  .protect-title {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.4px;
    color: var(--text-primary);
    line-height: 1.35;
    margin-bottom: 6px;
  }
  .protect-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  /* 진행 단계 */
  .steps {
    padding: 4px 20px 20px;
  }
  .step {
    display: flex;
    gap: 12px;
    padding: 16px 14px;
    background: var(--bg-white);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 10px;
    align-items: flex-start;
    text-align: left;
    width: 100%;
    cursor: pointer;
    font-family: var(--font);
  }
  .step.done {
    background: var(--safe-bg);
    border-color: var(--safe);
  }
  .step.active {
    background: var(--bg-white);
    border-color: var(--text-primary);
    border-width: 2px;
    padding: 15px 13px;
  }

  .step-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--bg-card);
    color: var(--text-tertiary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .step.done .step-num {
    background: var(--safe);
    color: white;
  }
  .step.active .step-num {
    background: var(--text-primary);
    color: white;
  }

  .step-body { flex: 1; }
  .step-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 2px;
  }
  .step-desc {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.5;
  }
  .step.done .step-desc {
    color: var(--safe);
    font-weight: 600;
  }

  .step-arrow {
    color: var(--text-tertiary);
    font-size: 18px;
    flex-shrink: 0;
    align-self: center;
  }
  .step.done .step-arrow { display: none; }
  .step.done::after {
    content: '✓';
    color: var(--safe);
    font-size: 20px;
    font-weight: 800;
    align-self: center;
  }

  /* 완료 요약 카드 */
  .done-summary {
    margin: 8px 20px 12px;
    padding: 16px 18px;
    background: var(--safe-bg);
    border-radius: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .done-summary .icon {
    width: 40px; height: 40px;
    background: var(--safe);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 20px;
    flex-shrink: 0;
  }
  .done-summary .body { flex: 1; }
  .done-summary .t {
    font-size: 13px;
    font-weight: 700;
    color: var(--safe);
    margin-bottom: 2px;
  }
  .done-summary .d {
    font-size: 12px;
    color: var(--text-primary);
    line-height: 1.4;
  }

  /* 안내 박스 */
  .info-box {
    margin: 4px 20px 100px;
    padding: 14px 16px;
    background: var(--bg-card);
    border-radius: 12px;
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.55;
  }
  .info-box strong {
    color: var(--text-primary);
    font-weight: 700;
  }
</style>
</head>
<body>

<div class="device">
  <div class="page-label">5. 보호조치 (일괄 변경)</div>
  <div class="screen">
    <div class="scroll-area">

    <div class="status-bar">
      <span>9:41</span>
      <div class="right">
        <span class="signal"></span><span>5G</span>
        <div class="battery"><div class="battery-fill"></div></div>
      </div>
    </div>

    <div class="app-header">
      <button class="back" onclick="history.back()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="title">계정 보호 조치</div>
      <div style="width:32px;"></div>
    </div>

    <!-- Hero -->
    <div class="protect-hero">
      <div class="protect-title">
        세 단계로<br>계정을 안전하게 만들어요
      </div>
      <div class="protect-desc">
        모두 완료하면 보호 상태가 해제되고<br>다시 평소처럼 결제할 수 있어요.
      </div>
    </div>

    <!-- 완료 요약 -->
    <div class="done-summary">
      <div class="icon">✓</div>
      <div class="body">
        <div class="t">위험 서비스 3곳 연결 해제 완료</div>
        <div class="d">배달의민족 · 쿠팡 · 스타벅스</div>
      </div>
    </div>

    <!-- 단계 리스트 -->
    <div class="steps">

      <!-- 완료된 단계 -->
      <button class="step done">
        <div class="step-num">1</div>
        <div class="step-body">
          <div class="step-title">위험 서비스 연결 해제</div>
          <div class="step-desc">3곳 해제 · 방금 완료됨</div>
        </div>
      </button>

      <!-- 진행 중인 단계 -->
      <button class="step active">
        <div class="step-num">2</div>
        <div class="step-body">
          <div class="step-title">카카오 비밀번호 변경 <span class="badge danger" style="margin-left:4px;">필수</span></div>
          <div class="step-desc">
            지난 접속이 유효하지 않게 만들어요.<br>
            변경 후 다른 기기는 자동으로 로그아웃돼요.
          </div>
        </div>
        <div class="step-arrow">›</div>
      </button>

      <!-- 남은 단계 -->
      <button class="step">
        <div class="step-num">3</div>
        <div class="step-body">
          <div class="step-title">2단계 인증 켜기 <span class="badge info" style="margin-left:4px;">권장</span></div>
          <div class="step-desc">
            비밀번호가 다시 유출돼도<br>기기 인증 없이는 로그인이 안 돼요.
          </div>
        </div>
        <div class="step-arrow">›</div>
      </button>

    </div>

    <!-- 안내 -->
    <div class="info-box">
      <strong>비밀번호 변경만 완료해도 보호가 해제돼요.</strong><br>
      2단계 인증은 다음에 켜셔도 되지만, 이번처럼 대규모 유출이 다시 발생했을 때 큰 도움이 돼요.
    </div>

    </div><!-- /scroll-area -->

    <div class="cta-fixed">
      <button class="btn primary" onclick="alert('실제 서비스에서는 카카오 계정 비밀번호 변경 화면으로 이동합니다.'); location.href='index.html';">
        지금 비밀번호 변경하기
      </button>
      <button class="btn ghost" onclick="location.href='index.html'">
        나중에 할게요
      </button>
    </div>

  </div>
</div>


<div style="position:fixed;right:12px;bottom:12px;z-index:9999;
            padding:8px 10px;border-radius:10px;background:rgba(255,255,255,.97);
            border:1px solid #E3E5E8;box-shadow:0 4px 16px rgba(0,0,0,.12);
            font-family:-apple-system,sans-serif;display:flex;align-items:center;gap:8px">
  <div style="font-size:11px;color:#666;line-height:1.35;text-align:right">
    <b style="color:#111">11 / 11</b><br>보호조치 3단계
  </div>
  <a href="account-locked.html" style="display:inline-block;padding:6px 12px;border-radius:8px;text-decoration:none;font-size:12px;font-weight:600;background:#fff;color:#333;border:1px solid #ddd">‹ 이전</a><span style="display:inline-block;padding:6px 12px;border-radius:8px;text-decoration:none;font-size:12px;font-weight:600;color:#bbb">끝</span>
</div>
</body>
